<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <h1>Users</h1>

    <h2>Create user</h2>
    <form id="create-form">
        <input type="text" id="create-name" placeholder="name" required>
        <input type="text" id="create-email" placeholder="email" required>
        <input type="text" id="create-username" placeholder="username" required>
        <input type="password" id="create-password" placeholder="password" required>

        <button type="submit" id="create-button">Create</button>
    </form>

    <h2>Update user</h2>
    <form id="update-form">
        <input type="text" id="update-id" placeholder="id" required>
        <input type="text" id="update-name" placeholder="name" required>
        <input type="text" id="update-email" placeholder="email" required>
        <input type="text" id="update-username" placeholder="username" required>
        <input type="password" id="update-password" placeholder="password" required>

        <button type="submit" id="update-button">Update</button>
    </form>

    <h2>Delete user</h2>
    <form id="delete-form">
        <input type="text" id="delete-id" placeholder="id" required>

        <button type="submit" id="delete-button">Delete</button>
    </form>

    <h2>Users list</h2>

    <ul id="user-list"></ul>

    <script src="app.js"></script>
</body>

</html>
