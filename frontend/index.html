<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <link href="style.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body {
            width: 100%;
            margin: 20px auto;
        }

        table {
            width: 100%;
            table-layout: auto;
        }

        input {
            width: 100%;
            box-sizing: border-box;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            word-wrap: break-word;
        }

        th {
            background-color: #f4f4f9;
            text-align: left;
        }
    </style>
</head>

<body>
    <h1>Users</h1>



    <div class="container col-lg-4">
        <h2>Create user</h2>
        <form id="create-form">
            <table class="table w-100">
                <tr>
                    <td><label for="create-name">Name:</label></td>
                    <td><input type="text" id="create-name" class="form-control" placeholder="name" required></td>
                </tr>
                <tr>
                    <td><label for="create-email">Email:</label></td>
                    <td><input type="text" id="create-email" class="form-control" placeholder="email" required></td>
                </tr>
                <tr>
                    <td><label for="create-username">Username:</label></td>
                    <td><input type="text" id="create-username" class="form-control" placeholder="username" required>
                    </td>
                </tr>
                <tr>
                    <td><label for="create-password">Password:</label></td>
                    <td><input type="password" id="create-password" class="form-control" placeholder="password"
                            required>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;">
                        <button type="submit" id="create-button" class="btn btn-primary">Create</button>
                    </td>
                </tr>
            </table>
        </form>
    </div>



    <div class="container col-lg-4">
        <h2>Update user</h2>
        <form id="update-form">
            <table class="table w-100">
                <tr>
                    <td><label for="update-id">ID:</label></td>
                    <td><input type="text" id="update-id" class="form-control" placeholder="id" required></td>
                </tr>
                <tr>
                    <td><label for="update-name">Name:</label></td>
                    <td><input type="text" id="update-name" class="form-control" placeholder="name" required></td>
                </tr>
                <tr>
                    <td><label for="update-email">Email:</label></td>
                    <td><input type="text" id="update-email" class="form-control" placeholder="email" required></td>
                </tr>
                <tr>
                    <td><label for="update-username">Username:</label></td>
                    <td><input type="text" id="update-username" class="form-control" placeholder="username" required>
                    </td>
                </tr>
                <tr>
                    <td><label for="update-password">Password:</label></td>
                    <td><input type="password" id="update-password" class="form-control" placeholder="password"
                            required>
                    </td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;">
                        <button type="submit" id="update-button" class="btn btn-warning">Update</button>
                    </td>
                </tr>
            </table>
        </form>
    </div>



    <div class="container col-lg-4">
        <h2>Delete user</h2>
        <form id="delete-form">
            <table class="table w-100">
                <tr>
                    <td><label for="delete-id">ID:</label></td>
                    <td><input type="text" id="delete-id" class="form-control" placeholder="id" required></td>
                </tr>
                <tr>
                    <td colspan="2" style="text-align: center;">
                        <button type="submit" id="delete-button" class="btn btn-danger">Delete</button>
                    </td>
                </tr>
            </table>
        </form>
    </div>



    <div class="container col-lg-4">
        <h2>Users list</h2>
        <table class="table w-100">
            <tbody id="user-list">
            </tbody>
        </table>
    </div>



    <script src="app.js"></script>
</body>

</html>
